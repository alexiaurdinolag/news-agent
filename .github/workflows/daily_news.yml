name: LATAM + US economic briefing

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python agent.py
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
     
